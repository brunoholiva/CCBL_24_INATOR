[tool.black]
line-length = 79
target-version = ["py311"]

[tool.ruff]
line-length = 79
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # import sorting (like isort)
    "D",  # docstring rules
]

ignore = [
    "D203",  # conflicts with numpy style
    "D213"
]

[tool.ruff.lint.pydocstyle]
convention = "numpy"